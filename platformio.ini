; ============================================================
;  platformio.ini — PlatformIO 設定（Arduino IDE 用戶可略過）
;  ESP32-S3 IoT 教學套件
; ============================================================

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; 序列埠速率
monitor_speed = 115200

; arduino-esp32 v3.x（支援新版 esp_task_wdt_reconfigure API）
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.7

; Flash 模式
board_build.flash_mode = qio
board_build.f_flash     = 80000000L

; 分區表（預設即可，教學用途）
; board_build.partitions = default.csv

; 上傳設定
upload_speed = 921600

; 依賴套件（本專案使用 Arduino 內建 WebServer，無需額外安裝）
lib_deps =
